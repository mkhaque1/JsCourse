<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <!--  body - parent -->
  <body class="dark">
    <h1 id="title">JavaScript</h1>
    <p class="text">Hello</p>

    <!-- inline script -->
    <button onclick="alert('Button clicked')">Click me</button>

    <div>
      <p class="item">One</p>
      <p class="item">Two</p>
      <p class="item">Three</p>
    </div>

    <div>
      <h1 id="count">0</h1>
      <button id="btn">Click Me</button>

      <button id="colorBtn">Change Color</button>
    </div>

    <div>
      <input id="nameInput" placeholder="Enter your name" />
      <button id="submit">update</button>

      <h2 id="output"></h2>
    </div>

    <!-- classList -->

    <div class="room"></div>
    <div class="room light-on"></div>

    <button id="darkBtn">Dark Mode</button>

    <button id="element">Add Paragraph</button>

    <div id="container">
      <p id="text">Delete Me</p>
    </div>

    <button id="delete">Delete Paragraph</button>

    <!-- todo -->

    <h1 style="margin-bottom: 20px">TODO APP</h1>

    <input id="taskInput" />

    <button id="addBtn">Add Task</button>

    <ul id="taskList"></ul>
  </body>

  <script src="eventListener.js"></script>
</html>
